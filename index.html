<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LKY English</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%234a6fa5'/><text x='32' y='24' text-anchor='middle' font-family='sans-serif' font-weight='800' font-size='16' fill='white'>LKY</text><text x='32' y='48' text-anchor='middle' font-size='22'>📖</text></svg>">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="LKY English">
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0efec;
    --border: #e0ddd8;
    --text: #2c2c2c;
    --text-muted: #777770;
    --accent: #4a6fa5;
    --accent2: #c0694a;
    --gold: #b8860b;
    --green: #3a7d44;
    --red: #c0392b;
    --orange: #c97b2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Password screen */
  .password-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s;
  }
  .password-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .password-logo {
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
  .password-hint {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
  }
  .password-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1.5rem;
    font-family: inherit;
    font-size: 1.1rem;
    color: var(--text);
    text-align: center;
    width: 250px;
    outline: none;
    transition: border-color 0.2s;
  }
  .password-input:focus { border-color: var(--accent); }
  .password-input.wrong {
    border-color: var(--red);
    animation: shake 0.4s ease;
  }
  .password-error {
    color: var(--red);
    font-size: 0.8rem;
    margin-top: 0.5rem;
    height: 1.2rem;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  .app-content { display: none; }
  .app-content.visible { display: block; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 2rem 1rem 1rem;
    position: relative;
  }
  .header h1 {
    font-size: 1.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
  }
  .header .subtitle {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-top: 0.3rem;
  }

  /* Streak */
  .streak-bar {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    padding: 1rem;
    margin: 0.5rem auto;
    max-width: 500px;
  }
  .streak-item {
    text-align: center;
  }
  .streak-number {
    font-size: 2rem;
    font-weight: 800;
    color: var(--gold);
  }
  .streak-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Navigation */
  .nav {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    flex-wrap: wrap;
  }
  .nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .nav button:hover { border-color: var(--accent); color: var(--text); }
  .nav button.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Sections */
  .section { display: none; padding: 1rem; max-width: 800px; margin: 0 auto; }
  .section.active { display: block; }

  /* ===== DASHBOARD ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 0.8rem;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    text-align: center;
  }
  .stat-value { font-size: 2rem; font-weight: 800; }
  .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.3rem; }
  .mastery-new .stat-value { color: var(--accent); }
  .mastery-learning .stat-value { color: var(--orange); }
  .mastery-known .stat-value { color: var(--green); }

  /* Daily chart */
  .daily-chart {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    margin-bottom: 1.5rem;
  }
  .daily-chart h3 {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 0.8rem;
  }
  .daily-bars {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 100px;
  }
  .daily-bar-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .daily-bar {
    width: 100%;
    max-width: 40px;
    background: var(--accent);
    border-radius: 4px 4px 0 0;
    min-height: 2px;
    position: relative;
    transition: height 0.5s ease;
  }
  .daily-bar-count {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--accent);
  }
  .daily-bar-date {
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .daily-total {
    text-align: right;
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
  }

  /* Speak button */
  .speak-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 36px;
    height: 36px;
    cursor: pointer;
    font-size: 1rem;
    color: var(--text-muted);
    transition: all 0.2s;
    margin-top: 0.5rem;
  }
  .speak-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Word list */
  .word-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .word-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .word-item:hover { border-color: var(--accent); transform: translateX(4px); }
  .word-flag { font-size: 1.3rem; }
  .word-term { font-weight: 700; font-size: 1rem; flex: 1; }
  .word-meaning { color: var(--text-muted); font-size: 0.85rem; max-width: 50%; text-align: right; }
  .word-mastery {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0;
  }
  .mastery-0 { background: var(--accent); }
  .mastery-1 { background: var(--orange); }
  .mastery-2 { background: var(--green); }

  /* ===== FLASHCARD ===== */
  .flashcard-container {
    perspective: 1000px;
    margin: 2rem auto;
    max-width: 500px;
  }
  .flashcard-progress {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-bottom: 1rem;
  }
  .flashcard {
    width: 100%;
    cursor: pointer;
  }
  .flashcard-face {
    width: 100%;
    min-height: 350px;
    border-radius: 16px;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .flashcard-front {
    background: linear-gradient(135deg, #fff, #f5f4f1);
    border: 1px solid var(--border);
  }
  .flashcard-back {
    background: linear-gradient(135deg, #f5f9f5, #eef5ee);
    border: 1px solid #c5d8c5;
    display: none;
  }
  .flashcard.flipped .flashcard-front { display: none; }
  .flashcard.flipped .flashcard-back { display: flex; }
  .flashcard-word {
    font-size: 2.2rem;
    font-weight: 800;
    margin-bottom: 1rem;
    color: var(--accent);
  }
  .flashcard-speaker {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }
  .flashcard-quote {
    font-size: 0.9rem;
    font-style: italic;
    color: var(--text-muted);
    line-height: 1.5;
    max-width: 400px;
  }
  .flashcard-quote mark {
    background: rgba(74, 111, 165, 0.15);
    color: var(--accent);
    border-radius: 3px;
    padding: 0 3px;
  }
  .flashcard-hint {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 1.5rem;
    opacity: 0.5;
  }
  .flashcard-meaning {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 0.8rem;
  }
  .flashcard-detail {
    font-size: 0.9rem;
    color: var(--text-muted);
    line-height: 1.6;
    max-width: 400px;
  }
  .flashcard-etymology {
    margin-top: 1rem;
    padding: 0.8rem;
    background: rgba(0,0,0,0.03);
    border-radius: 8px;
    font-size: 0.8rem;
  }
  .flashcard-etymology .root {
    color: var(--gold);
    font-weight: 700;
  }
  .flashcard-actions {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
    margin-top: 1.5rem;
    position: relative;
    z-index: 10;
  }
  .flashcard-actions button {
    padding: 0.8rem 1.5rem;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-forgot { background: var(--red); color: #fff; }
  .btn-forgot:hover { filter: brightness(1.2); }
  .btn-hard { background: var(--orange); color: #fff; }
  .btn-hard:hover { filter: brightness(1.2); }
  .btn-easy { background: var(--green); color: #000; }
  .btn-easy:hover { filter: brightness(1.2); }

  /* ===== QUIZ ===== */
  .quiz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 2rem;
    margin-bottom: 1rem;
    transition: all 0.3s;
  }
  .quiz-card.correct { border-color: var(--green); background: rgba(74, 222, 128, 0.05); }
  .quiz-card.wrong { border-color: var(--red); background: rgba(248, 113, 113, 0.05); }
  .quiz-type {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 0.8rem;
  }
  .quiz-question {
    font-size: 1.1rem;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 1rem;
  }
  .quiz-question .blank {
    display: inline-block;
    min-width: 120px;
    border-bottom: 2px solid var(--accent);
    margin: 0 4px;
  }
  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }
  .quiz-option {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    color: var(--text);
    text-align: left;
    transition: all 0.2s;
  }
  .quiz-option:hover { border-color: var(--accent); }
  .quiz-option.selected-correct {
    border-color: var(--green);
    background: rgba(58, 125, 68, 0.1);
    color: var(--green);
  }
  .quiz-option.selected-wrong {
    border-color: var(--red);
    background: rgba(192, 57, 43, 0.1);
    color: var(--red);
  }
  .quiz-option.reveal-correct {
    border-color: var(--green);
    background: rgba(58, 125, 68, 0.08);
  }
  .quiz-feedback {
    margin-top: 1rem;
    padding: 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    line-height: 1.7;
    display: none;
    color: var(--text);
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.correct-fb { background: rgba(58, 125, 68, 0.08); border: 1px solid rgba(58, 125, 68, 0.2); }
  .quiz-feedback.wrong-fb { background: rgba(192, 57, 43, 0.08); border: 1px solid rgba(192, 57, 43, 0.2); }
  .quiz-feedback .fb-result { font-weight: 700; margin-bottom: 0.5rem; }
  .quiz-feedback .fb-result.correct-text { color: var(--green); }
  .quiz-feedback .fb-result.wrong-text { color: var(--red); }
  .quiz-feedback .fb-word { font-size: 1.1rem; font-weight: 700; color: var(--accent); margin-bottom: 0.3rem; }
  .quiz-feedback .fb-meaning { font-weight: 600; margin-bottom: 0.4rem; }
  .quiz-feedback .fb-detail { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.4rem; }
  .quiz-feedback .fb-quote { font-size: 0.85rem; font-style: italic; color: var(--text-muted); padding: 0.5rem; background: rgba(0,0,0,0.03); border-radius: 6px; margin-bottom: 0.4rem; }
  .quiz-feedback .fb-speaker { font-size: 0.75rem; color: var(--text-muted); }
  .quiz-feedback .fb-etymology { font-size: 0.8rem; margin-top: 0.4rem; padding: 0.4rem 0.6rem; background: rgba(184,134,11,0.08); border-radius: 6px; }
  .quiz-feedback .fb-etymology .root { color: var(--gold); font-weight: 700; }
  .quiz-score {
    text-align: center;
    padding: 2rem;
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
  }
  .quiz-score-number {
    font-size: 3rem;
    font-weight: 800;
  }
  .quiz-score-label {
    color: var(--text-muted);
    margin-top: 0.5rem;
  }
  .quiz-next-btn {
    display: block;
    margin: 1rem auto;
    padding: 0.8rem 2rem;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }
  .quiz-next-btn:hover { filter: brightness(1.2); }

  /* Etymology tree */
  .etymology-section { margin-top: 1.5rem; }
  .etymology-tree {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 0.8rem;
    text-align: center;
  }
  .etym-root {
    display: inline-block;
    padding: 0.4rem 1rem;
    background: rgba(255, 215, 0, 0.15);
    border: 1px solid rgba(255, 215, 0, 0.3);
    border-radius: 20px;
    color: var(--gold);
    font-weight: 700;
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
  }
  .etym-arrow { color: var(--text-muted); font-size: 1.2rem; }
  .etym-words {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }
  .etym-word {
    padding: 0.3rem 0.8rem;
    background: rgba(108,140,255,0.15);
    border: 1px solid rgba(108,140,255,0.3);
    border-radius: 15px;
    font-size: 0.8rem;
    color: var(--accent);
  }

  /* Copy results */
  .copy-btn {
    display: block;
    margin: 1.5rem auto;
    padding: 0.8rem 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--text); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }

  /* ===== QUOTES ===== */
  .quote-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.8rem;
    margin-bottom: 1rem;
    cursor: pointer;
    transition: all 0.3s;
  }
  .quote-card:hover { border-color: var(--accent); }
  .quote-card.expanded { border-color: var(--accent); }
  .quote-speaker {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 0.8rem;
  }
  .quote-speaker-flag { font-size: 1.3rem; }
  .quote-speaker-name { font-weight: 700; font-size: 0.95rem; }
  .quote-speaker-title {
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .quote-text {
    font-size: 1.05rem;
    line-height: 1.8;
    font-style: italic;
    color: var(--text);
    position: relative;
    padding-left: 1.2rem;
    border-left: 3px solid var(--accent);
  }
  .quote-text mark {
    background: rgba(74, 111, 165, 0.12);
    color: var(--accent);
    border-radius: 3px;
    padding: 0 3px;
    font-weight: 600;
    cursor: help;
  }
  .quote-translation {
    margin-top: 1rem;
    padding: 1rem;
    background: var(--surface2);
    border-radius: 8px;
    font-size: 0.88rem;
    line-height: 1.7;
    color: var(--text-muted);
    display: none;
  }
  .quote-card.expanded .quote-translation { display: block; }
  .quote-vocab {
    margin-top: 0.8rem;
    display: none;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .quote-card.expanded .quote-vocab { display: flex; }
  .quote-vocab-tag {
    padding: 0.25rem 0.7rem;
    background: rgba(74, 111, 165, 0.08);
    border: 1px solid rgba(74, 111, 165, 0.2);
    border-radius: 15px;
    font-size: 0.75rem;
    color: var(--accent);
    font-weight: 600;
  }
  .quote-detail {
    margin-top: 0.8rem;
    padding: 1rem;
    background: rgba(74, 111, 165, 0.04);
    border-radius: 8px;
    font-size: 0.85rem;
    line-height: 1.8;
    color: var(--text);
    display: none;
  }
  .quote-card.expanded .quote-detail { display: block; }
  .quote-detail h4 {
    font-size: 0.8rem;
    color: var(--accent);
    margin: 0.8rem 0 0.3rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .quote-detail h4:first-child { margin-top: 0; }
  .quote-detail ul {
    padding-left: 1.2rem;
    margin: 0.3rem 0;
  }
  .quote-detail li {
    margin-bottom: 0.3rem;
  }
  .quote-detail .vocab-inline {
    font-weight: 700;
    color: var(--accent);
  }
  .quote-detail .example {
    padding: 0.5rem 0.8rem;
    background: rgba(58, 125, 68, 0.06);
    border-left: 2px solid var(--green);
    border-radius: 4px;
    margin: 0.4rem 0;
    font-size: 0.82rem;
    color: var(--text-muted);
  }
  .quote-expand-hint {
    text-align: right;
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
    opacity: 0.5;
  }
  .quote-card.expanded .quote-expand-hint { display: none; }
  .quote-play-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    font-size: 0.8rem;
    color: var(--text-muted);
    transition: all 0.2s;
    margin-top: 0.8rem;
    display: none;
  }
  .quote-card.expanded .quote-play-btn { display: inline-block; }
  .quote-play-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Quote Challenge Mode */
  .quote-mode-toggle {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 1.2rem;
  }
  .quote-mode-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.5rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.8rem;
    transition: all 0.2s;
  }
  .quote-mode-btn:hover { border-color: var(--accent); color: var(--text); }
  .quote-mode-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .quote-filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.4rem 0.8rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.75rem;
    transition: all 0.2s;
  }

// ===== STATE =====
const SYNC_URL = 'https://jsonblob.com/api/jsonBlob/019d5b93-c923-76d6-a3c1-0780abe37691';
let mastery = JSON.parse(localStorage.getItem('lky-mastery') || '{}');
let quizHistory = JSON.parse(localStorage.getItem('lky-quiz-history') || '[]');
let streak = JSON.parse(localStorage.getItem('lky-streak') || '{"count":1,"lastDate":"2026-04-04"}');
let fcIndex = 0;
let fcFlipped = false;
let fcOrder = [];
let quizQuestions = [];
let quizIndex = 0;
let quizCorrect = 0;
let quizResults = [];
let syncDebounce = null;

// ===== CLOUD SYNC =====
async function cloudLoad() {
  try {
    const res = await fetch(SYNC_URL);
    if (!res.ok) return;
    const cloud = await res.json();
    // Merge: take the higher mastery for each word, more quiz history, higher streak
    if (cloud.mastery) {
      for (const [k, v] of Object.entries(cloud.mastery)) {
        if (mastery[k] === undefined || v > mastery[k]) mastery[k] = v;
      }
      localStorage.setItem('lky-mastery', JSON.stringify(mastery));
    }
    if (cloud.quizHistory && cloud.quizHistory.length > quizHistory.length) {
      quizHistory = cloud.quizHistory;
      localStorage.setItem('lky-quiz-history', JSON.stringify(quizHistory));
    }
    if (cloud.streak && cloud.streak.count > streak.count) {
      streak = cloud.streak;
      localStorage.setItem('lky-streak', JSON.stringify(streak));
    }
  } catch (e) { console.log('Cloud load failed:', e); }
}

async function cloudSave() {
  try {
    await fetch(SYNC_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mastery, quizHistory, streak })
    });
  } catch (e) { console.log('Cloud save failed:', e); }
}

function scheduleSync() {
  if (syncDebounce) clearTimeout(syncDebounce);
  syncDebounce = setTimeout(cloudSave, 2000);
}

// ===== INIT =====
async function init() {
  await cloudLoad();
  WORDS.forEach(w => { if (!mastery[w.id]) mastery[w.id] = 0; });
  updateStreak();
  renderDashboard();
  initFlashcards();
  renderEtymology();
  if (quoteMode === 'challenge') {
    startChallenge();
  } else {
    renderQuotes();
  }
  updateStats();
}

function updateStreak() {
  const today = new Date().toISOString().split('T')[0];
  if (streak.lastDate !== today) {
    const last = new Date(streak.lastDate);
    const diff = Math.floor((new Date(today) - last) / 86400000);
    streak.count = diff === 1 ? streak.count + 1 : 1;
    streak.lastDate = today;
    localStorage.setItem('lky-streak', JSON.stringify(streak));
    scheduleSync();
  }
  document.getElementById('streakCount').textContent = streak.count;
}

function updateStats() {
  const vals = Object.values(mastery);
  document.getElementById('totalWords').textContent = WORDS.length;
  document.getElementById('countNew').textContent = vals.filter(v => v === 0).length;
  document.getElementById('countLearning').textContent = vals.filter(v => v === 1).length;
  document.getElementById('countKnown').textContent = vals.filter(v => v === 2).length;
  const total = quizHistory.reduce((a, b) => a + b.total, 0);
  const correct = quizHistory.reduce((a, b) => a + b.correct, 0);
  document.getElementById('quizAccuracy').textContent = total > 0 ? Math.round(correct / total * 100) + '%' : '—';
}

function saveMastery() {
  localStorage.setItem('lky-mastery', JSON.stringify(mastery));
  updateStats();
  scheduleSync();
}

function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'quiz') startQuiz();
  // Show header/streak only on dashboard
  const header = document.querySelector('.header');
  const streak = document.querySelector('.streak-bar');
  if (name === 'dashboard') {
    header.style.display = '';
    streak.style.display = '';
  } else {
    header.style.display = 'none';
    streak.style.display = 'none';
  }
}

// ===== DASHBOARD =====
function renderDailyChart() {
  const chart = document.getElementById('dailyChart');
  const dateCounts = {};
  WORDS.forEach(w => {
    if (!w.date) return;
    dateCounts[w.date] = (dateCounts[w.date] || 0) + 1;
  });
  const dates = Object.keys(dateCounts).sort();
  if (dates.length === 0) { chart.style.display = 'none'; return; }

  const maxCount = Math.max(...Object.values(dateCounts));
  const totalWords = WORDS.length;
  const barHeight = 80;

  chart.innerHTML = `
    <h3>Daily Progress</h3>
    <div class="daily-bars">
      ${dates.map(d => {
        const count = dateCounts[d];
        const h = Math.max(4, (count / maxCount) * barHeight);
        const label = d.slice(5).replace('-', '/');
        return `<div class="daily-bar-group">
          <div class="daily-bar-count">${count}</div>
          <div class="daily-bar" style="height:${h}px"></div>
          <div class="daily-bar-date">${label}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="daily-total">Total: ${totalWords} words in ${dates.length} day${dates.length > 1 ? 's' : ''}</div>
  `;
}

function renderDashboard() {
  renderDailyChart();
  const list = document.getElementById('wordList');
  list.innerHTML = '';
  WORDS.forEach(w => {
    const m = mastery[w.id] || 0;
    const div = document.createElement('div');
    div.className = 'word-item animate-in';
    div.innerHTML = `
      <span class="word-flag">${w.flag}</span>
      <span class="word-term">${w.term}</span>
      <span class="word-meaning">${w.meaning}</span>
      <span class="word-mastery mastery-${m}"></span>
    `;
    list.appendChild(div);
  });
}

    <div class="flashcard-word">${w.emoji ? w.emoji + ' ' : ''}${w.term}</div>

function flipCard() {
  const fc = document.getElementById('flashcard');
  fcFlipped = !fcFlipped;
  fc.classList.toggle('flipped');
}

function rateCard(level) {
  const w = WORDS[fcOrder[fcIndex]];
  mastery[w.id] = level;
  saveMastery();
  renderDashboard();
  fcIndex++;
  if (fcIndex < fcOrder.length) {
    renderFlashcard();
  } else {
    document.getElementById('fcFront').innerHTML = '<div class="flashcard-word">Complete!</div><div class="flashcard-hint">全カード完了</div>';
    document.getElementById('fcBack').innerHTML = '';

// ===== QUIZ =====
function startQuiz() {
  quizQuestions = generateQuiz();
  quizIndex = 0;
  quizCorrect = 0;
  quizResults = [];
  document.getElementById('copyResults').style.display = 'none';
  renderQuizQuestion();
}

function generateQuiz() {
  const questions = [];
  const shuffled = [...WORDS].sort(() => Math.random() - 0.5);

  // Type 1: Meaning quiz
  shuffled.slice(0, 5).forEach(w => {
    const options = [w.meaning];
    const others = WORDS.filter(x => x.id !== w.id).sort(() => Math.random() - 0.5).slice(0, 3);
    others.forEach(o => options.push(o.meaning));
    questions.push({
      type: 'meaning',
      typeLabel: '意味を選べ',
      question: `<strong>${w.term}</strong> の意味は？`,
      options: options.sort(() => Math.random() - 0.5),
      answer: w.meaning,
      word: w
    });
  });

  // Type 2: Fill in the blank
  shuffled.slice(5, 10).forEach(w => {
    if (!w.quote) return;
    const blank = w.quote.replace(/<mark>.*?<\/mark>/, '<span class="blank">&nbsp;</span>');
    const correctText = w.quote.match(/<mark>(.*?)<\/mark>/)?.[1] || w.term;
    const options = [correctText];
    const others = WORDS.filter(x => x.id !== w.id).sort(() => Math.random() - 0.5).slice(0, 3);
    others.forEach(o => {
      const m = o.quote?.match(/<mark>(.*?)<\/mark>/);
      if (m) options.push(m[1]);
      else options.push(o.term);
    });
    if (options.length < 4) return;
    questions.push({
      type: 'fill',
      typeLabel: '穴埋め',
      question: `${blank}<br><small style="color:var(--text-muted)">${w.flag} ${w.speaker}</small>`,
      options: options.slice(0, 4).sort(() => Math.random() - 0.5),
      answer: correctText,
      word: w
    });
  });

  return questions.sort(() => Math.random() - 0.5).slice(0, 8);
}

function renderQuizQuestion() {
  const area = document.getElementById('quizArea');
  if (quizIndex >= quizQuestions.length) {
    renderQuizScore();
    return;
  }
  const q = quizQuestions[quizIndex];
  area.innerHTML = `
    <div class="flashcard-progress">${quizIndex + 1} / ${quizQuestions.length}</div>
    <div class="quiz-card" id="currentQuiz">
      <div class="quiz-type">${q.typeLabel}</div>
      <div class="quiz-question">${q.question}</div>
      <div class="quiz-options">
        ${q.options.map((o, i) => {
          const speakText = q.type === 'fill' ? o : q.word.term;
          return `<button class="quiz-option" onclick="answerQuiz(${i})" style="display:flex;align-items:center;justify-content:space-between;">${o}<span class="speak-btn" style="margin-left:0.4rem;width:28px;height:28px;font-size:0.8rem;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;" onclick="event.stopPropagation(); speak('${speakText.replace(/'/g, "\\'")}')">🔊</span></button>`;
        }).join('')}
      </div>
      <div class="quiz-feedback" id="quizFeedback"></div>
    </div>
    <button class="quiz-next-btn" id="quizNextBtn" style="display:none" onclick="nextQuiz()">次へ →</button>
  `;
}

function answerQuiz(idx) {
  const q = quizQuestions[quizIndex];
  const options = document.querySelectorAll('.quiz-option');
  const selected = q.options[idx];
  const correct = selected === q.answer;

  options.forEach((opt, i) => {
    opt.style.pointerEvents = 'none';
    if (q.options[i] === q.answer) opt.classList.add('reveal-correct');
    if (i === idx && !correct) opt.classList.add('selected-wrong');
    if (i === idx && correct) opt.classList.add('selected-correct');
  });

  const fb = document.getElementById('quizFeedback');
  const card = document.getElementById('currentQuiz');

  const w = q.word;
  let etymHtml = '';
  if (w.etymology) {
    etymHtml = `<div class="fb-etymology"><span class="root">${w.etymology.root}</span> = ${w.etymology.meaning} → ${w.etymology.words.join(', ')}</div>`;
  }
  const detailHtml = `
    <div class="fb-word">${w.term} <button class="speak-btn" onclick="event.stopPropagation(); speak('${w.term.replace(/'/g, "\\'")}')">🔊</button></div>
    <div class="fb-meaning">${w.meaning}</div>
    <div class="fb-detail">${w.detail}</div>
    <div class="fb-quote">${w.quote}</div>
    <div class="fb-speaker">${w.flag} ${w.speaker}</div>
    ${etymHtml}
  `;

  // Update mastery based on quiz result
  const prevMastery = mastery[w.id] || 0;
  if (correct) {
    quizCorrect++;
    mastery[w.id] = Math.min(2, prevMastery + 1);
    fb.className = 'quiz-feedback show correct-fb';
    fb.innerHTML = `<div class="fb-result correct-text">✓ 正解!</div>${detailHtml}`;
    card.classList.add('correct');
    spawnConfetti();
  } else {
    mastery[w.id] = Math.max(0, prevMastery - 1);
    fb.className = 'quiz-feedback show wrong-fb';
    fb.innerHTML = `<div class="fb-result wrong-text">✗ 正解: ${q.answer}</div>${detailHtml}`;
    card.classList.add('wrong');
  }
  saveMastery();
  renderDashboard();

  quizResults.push({ word: q.word.term, correct });
  document.getElementById('quizNextBtn').style.display = 'block';
}

function nextQuiz() {
  quizIndex++;
  renderQuizQuestion();
}

function renderQuizScore() {
  const pct = Math.round(quizCorrect / quizQuestions.length * 100);
  const color = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--orange)' : 'var(--red)';
  document.getElementById('quizArea').innerHTML = `
    <div class="quiz-score">
      <div class="quiz-score-number" style="color:${color}">${pct}%</div>
      <div class="quiz-score-label">${quizCorrect} / ${quizQuestions.length} 正解</div>
      <br>
      ${quizResults.map(r => `<span style="color:${r.correct ? 'var(--green)' : 'var(--red)'}">${r.correct ? '✓' : '✗'} ${r.word}</span>`).join('&nbsp;&nbsp;')}
      <br><br>
      <button class="quiz-next-btn" onclick="startQuiz()">もう一度</button>
    </div>
  `;
  document.getElementById('copyResults').style.display = 'block';

  quizHistory.push({ date: new Date().toISOString(), correct: quizCorrect, total: quizQuestions.length });
  localStorage.setItem('lky-quiz-history', JSON.stringify(quizHistory));
  updateStats();
  scheduleSync();
}

function spawnConfetti() {
  const colors = ['#ffd700', '#6c8cff', '#4ade80', '#ff6c8c', '#a78bfa'];
  for (let i = 0; i < 12; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-particle';
    el.style.left = (40 + Math.random() * 20) + 'vw';
    el.style.top = (30 + Math.random() * 20) + 'vh';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animation = `confetti ${0.6 + Math.random() * 0.5}s ease forwards`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }
}

// ===== COPY RESULTS =====
function copyResults() {
  const missed = quizResults.filter(r => !r.correct).map(r => r.word);
  const pct = Math.round(quizCorrect / quizQuestions.length * 100);
  const text = `Quiz Result: ${pct}% (${quizCorrect}/${quizQuestions.length})\n` +
    `Date: ${new Date().toLocaleDateString()}\n` +
    `Missed: ${missed.length > 0 ? missed.join(', ') : 'none'}\n` +
    `Mastery: New=${document.getElementById('countNew').textContent} Learning=${document.getElementById('countLearning').textContent} Known=${document.getElementById('countKnown').textContent}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyResults');
    btn.textContent = '✓ コピーしました!';

// ===== ETYMOLOGY =====
function renderEtymology() {
  const area = document.getElementById('etymologyArea');
  const seen = new Set();
  WORDS.forEach(w => {
    if (!w.etymology || seen.has(w.etymology.root)) return;
    seen.add(w.etymology.root);
    const div = document.createElement('div');
    div.className = 'etymology-tree animate-in';
    div.innerHTML = `
      <div class="etym-root">${w.etymology.root}</div>
      <div style="color:var(--text-muted);font-size:0.8rem;margin:0.3rem 0;">${w.etymology.meaning}</div>
      <div class="etym-arrow">↓</div>
      <div class="etym-words">
        ${w.etymology.words.map(ew => `<span class="etym-word">${ew}</span>`).join('')}
      </div>
    `;
    area.appendChild(div);
  });
}

// ===== SPEAK =====
let voicesLoaded = false;
let bestVoice = null;
speechSynthesis.onvoiceschanged = () => { voicesLoaded = true; bestVoice = null; findBestVoice(); };

function findBestVoice() {
  if (bestVoice) return bestVoice;
  const voices = speechSynthesis.getVoices();
  // Prefer Premium > Enhanced > standard, English voices on macOS
  const tiers = [
    v => v.name.includes('Premium') && v.lang.startsWith('en'),
    v => v.name.includes('Enhanced') && v.lang.startsWith('en'),
  ];
  for (const test of tiers) {
    bestVoice = voices.find(test);
    if (bestVoice) return bestVoice;
  }
  const preferred = ['Evan', 'Zoe', 'Samantha', 'Karen', 'Daniel', 'Moira', 'Tessa', 'Fiona'];
  for (const name of preferred) {
    bestVoice = voices.find(v => v.name.includes(name) && v.lang.startsWith('en'));
    if (bestVoice) return bestVoice;
  }
  bestVoice = voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en'));
  return bestVoice;
}

function speak(text) {
  speechSynthesis.cancel();
  const voice = findBestVoice();
  // Split into sentences for natural pauses
  const sentences = text.match(/[^.;!?—]+[.;!?—]+|[^.;!?—]+$/g) || [text];
  sentences.forEach((sentence, i) => {
    const s = sentence.trim();
    if (!s) return;
    const utterance = new SpeechSynthesisUtterance(s);
    utterance.lang = 'en-US';
    utterance.rate = 0.55;
    utterance.pitch = 0.85;
    if (voice) utterance.voice = voice;
    // Add a pause between sentences
    if (i > 0) {
      const pause = new SpeechSynthesisUtterance('');
      pause.lang = 'en-US';
      if (voice) pause.voice = voice;
      pause.volume = 0;
      // Comma/semicolon = short pause, period = longer pause
      pause.rate = 0.1;
      speechSynthesis.speak(pause);
    }
    speechSynthesis.speak(utterance);
  });
}

  { speaker: 'LKY', title: 'Ch.1 p.15', flag: '🇸🇬', chapter: 'Ch.1',

    translation: '急な通知で集められる限りのシンガポール駐在の外交団メンバーに会った。',
    vocab: ['diplomatic corps', 'at short notice'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.15', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'As the diplomats left, I <mark>drew aside</mark> the Indian Deputy High Commissioner and the UAR Consul General and gave them letters for Prime Minister Shastri and President Nasser.',
    translation: '外交官たちが帰る際、インドの高等弁務官代理とUARの総領事を脇に引き寄せ、シャストリ首相とナセル大統領への手紙を渡した。',
    vocab: ['drew aside', 'Deputy High Commissioner', 'Consul General'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.15', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'In my letters, I <mark>sought</mark> their recognition and support. From India, I asked for advice to train an army, and from Egypt, an advisor to build a coastal defense force.',
    translation: '手紙の中で承認と支持を求めた。インドには軍隊の訓練の助言を、エジプトには沿岸防衛力構築の顧問を求めた。',
    vocab: ['sought', 'recognition', 'coastal defense force'], detail: '' },
  { speaker: 'Reporter', title: 'Ch.1 p.15', flag: '🎤', chapter: 'Ch.1',
    text: 'Could you <mark>outline</mark> for us the <mark>train of events</mark> that <mark>led to</mark> this morning\'s proclamation?',
    translation: '今朝の宣言に至った一連の出来事を、かいつまんで説明していただけますか？',
    vocab: ['outline', 'train of events', 'led to'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.15', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'This is a moment of <mark>anguish</mark> because all my life I have believed in merger and the unity of these two territories, with the people connected by geography, economics, and <mark>ties of kinship</mark>. Would you mind if we stop for a while?',
    translation: 'これは苦悶の瞬間なのです。なぜなら私は生涯を通じて、地理、経済、血縁の絆で結ばれたこの2つの領土の合併と統一を信じてきたからです。— 少し中断してもよろしいですか。',
    vocab: ['anguish', 'ties of kinship', 'merger'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.16', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'It was only after another 20 minutes that I was able to regain my <mark>composure</mark> and <mark>resume</mark> the press conference.',
    translation: 'さらに20分が経ってようやく、落ち着きを取り戻し、記者会見を再開できた。',
    vocab: ['composure', 'resume', 'regain'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.16', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'I asked P.S. Raman to cut the <mark>footage</mark> of my <mark>breakdown</mark>.',
    translation: 'P.S.ラマンに、自分が崩れた場面の映像をカットするよう頼んだ。',
    vocab: ['footage', 'breakdown'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.16', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'Among Chinese, it is <mark>unbecoming</mark> to exhibit such a lack of manliness.',
    translation: '中国人の間では、そのような男らしさの欠如をさらけ出すのはみっともないことである。',
    vocab: ['unbecoming', 'exhibit', 'manliness'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.16', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'It was some <mark>consolation</mark> that my viewers in Britain, Australia, and New Zealand <mark>sympathized</mark> with me and with Singapore.',
    translation: 'イギリス、オーストラリア、ニュージーランドの視聴者が私とシンガポールに同情してくれたことは、いくらかの慰めだった。',
    vocab: ['consolation', 'sympathized'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.16', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'I was emotionally <mark>overstressed</mark>, having gone through three days and nights of a <mark>wrenching</mark> experience.',
    translation: '感情的に限界を超えており、3日3晩の身を引き裂かれるような経験を経てきたのだった。',
    vocab: ['overstressed', 'wrenching'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.16', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'I was <mark>weighted down</mark> by a heavy sense of <mark>guilt</mark>.',
    translation: '重い罪悪感に押しつぶされていた。',
    vocab: ['weighted down', 'guilt'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.16', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'I felt I had <mark>let down</mark> several million people in Malaysia.',
    translation: 'マレーシアの数百万の人々を裏切ってしまったと感じていた。',
    vocab: ['let down'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.17', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'I was <mark>ashamed</mark> that I had left our allies and supporters to <mark>fend for themselves</mark>.',
    translation: '仲間や支持者たちを自力で生き延びさせるために置き去りにしたことを恥じていた。',
    vocab: ['ashamed', 'fend for themselves'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.17', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'I had <mark>aroused</mark> their hopes, and they had joined people in Singapore in resisting Malay <mark>hegemony</mark>, the <mark>root cause</mark> of our dispute.',
    translation: '私が彼らの希望を掻き立て、彼らはシンガポールの人々と共にマレー系の覇権 — 争いの根本原因 — に抵抗してきたのだ。',
    vocab: ['aroused', 'hegemony', 'root cause'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.17', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'I was also filled with <mark>remorse</mark> and guilt for having had to <mark>deceive</mark> the Prime Ministers of Britain, Australia, and New Zealand.',
    translation: 'イギリス、オーストラリア、ニュージーランドの首相たちを欺かなければならなかったことへの後悔と罪悪感にも満たされていた。',
    vocab: ['remorse', 'deceive'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.17', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'All those thoughts <mark>preyed on</mark> me during the three weeks of our negotiations with Razak, the Tunku\'s deputy.',
    translation: 'それらの思いすべてが、ラザクとの3週間の交渉の間、私に食らいついて離れなかった。',
    vocab: ['preyed on'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.17', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'But once the <mark>deed was done</mark>, my feelings <mark>got the better of</mark> me.',
    translation: 'しかし事が済んでしまうと、感情が私を打ち負かした。',
    vocab: ['deed was done', 'got the better of'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.17', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'While I was thus <mark>overawed</mark>, the merchants in Singapore\'s Chinatown were <mark>jubilant</mark>.',
    translation: '私がこうして圧倒されている間、チャイナタウンの商人たちは歓喜に沸いていた。',
    vocab: ['overawed', 'jubilant'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.17', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'We have set out to create a broad <mark>coalition</mark> for a <mark>Malaysian Malaysia</mark>, not a <mark>Malay Malaysia</mark>.',
    translation: 'マレー人のマレーシアではなく、マレーシア人のマレーシアのために、幅広い連合を作ろうとしていた。',
    vocab: ['coalition', 'Malaysian Malaysia', 'Malay Malaysia'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.18', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'By the next day, investors had decided independence was good for the economy, and there was an even larger <mark>turnover</mark>. The value of 25 out of 27 industrial stocks rose.',
    translation: '翌日までに投資家たちは独立が経済に良いと判断し、さらに大きな出来高を記録した。27の工業株のうち25が値上がりした。',
    vocab: ['turnover', 'industrial stocks'], detail: '' },
  // === Day 4 (2026-04-07) — Ch.1 p.18-19 ===
  { speaker: 'LKY', title: 'Ch.1 p.18', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'In the city center, <mark>by contrast</mark>, the streets were <mark>deserted</mark> by the afternoon of 9 August.',
    translation: '対照的に、市の中心部では8月9日の午後には通りは人けがなくなっていた。',
    vocab: ['deserted', 'by contrast'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.18', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'I had informed John Lee Chan (the Singapore Police Commissioner) of the <mark>impending</mark> announcement and had handed him a letter telling him to <mark>take his instructions from</mark> the Singapore Government in the future.',
    translation: '私はジョン・リー・チャン（シンガポール警察長官）に差し迫った発表を伝え、今後はシンガポール政府から指示を受けるよう命じる書簡を手渡していた。',
    vocab: ['impending', 'commissioner', 'take his instructions from'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.18-19', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'Lee Kuan Yew had <mark>deployed</mark> his police reserve units, <mark>paramilitary</mark> Gurkhas specially trained to deal with violent rioters, just in case pro-UMNO Malay activists in Singapore <mark>went on a rampage</mark> to protest against separation.',
    translation: 'リー・クワンユーは暴徒鎮圧の特別訓練を受けた準軍事組織のグルカ兵を配置していた。分離に抗議して活動家が暴れ回る場合に備えて。',
    vocab: ['deployed', 'paramilitary', 'Gurkhas', 'went on a rampage'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.19', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'It was a suitably informal welcome, for with independence my relations with him had suddenly become <mark>equivocal</mark>.',
    translation: 'それはちょうどよく砕けた歓迎だった。独立によって、彼との関係が突然あいまいなものになっていたからだ。',
    vocab: ['suitably informal', 'equivocal'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.19', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'I reached the porch in time to greet him and asked him, \'Who are you talking <mark>on behalf of</mark>?\'',
    translation: '私はポーチに着き、「あなたは誰を代表して話しているのですか？」と尋ねた。',
    vocab: ['on behalf of'], detail: '' },
  { speaker: 'Lord Head', title: 'Ch.1 p.19', flag: '🇬🇧', chapter: 'Ch.1',
    text: '\'Well, of course, you know, I am <mark>accredited to</mark> a foreign government.\'',
    translation: '「ええ、もちろん、私は外国政府に対して信任されている身ですから。」',
    vocab: ['accredited to'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.19', flag: '🇸🇬', chapter: 'Ch.1',
    text: '\'Exactly. And have you got <mark>specific authority</mark> to speak to me about Singapore\'s relation with Britain?\'',
    translation: '「その通り。ではシンガポールとイギリスの関係について私に話す具体的な権限をお持ちですか？」',
    vocab: ['specific authority'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.19', flag: '🇸🇬', chapter: 'Ch.1',
    text: '\'Then this is the <mark>tête-à-tête</mark>; it is just a <mark>chit-chat</mark>.\'',
    translation: '「では、これは内輪の雑談ですね。ただのおしゃべりということで。」',
    vocab: ['tête-à-tête', 'chit-chat'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.19', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'When describing this meeting to a group of British and Australian <mark>foreign correspondents</mark> last month, I tried to give the impression of an encounter between two <mark>adversaries</mark>.',
    translation: '先月、外国人特派員たちにこの会合を語った際、私は二人の敵同士の対峙という印象を与えようとした。',
    vocab: ['foreign correspondents', 'give the impression', 'adversaries'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.19', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'In truth, I had a heavy head throughout. His <mark>bearing</mark> impressed me.',
    translation: '実のところ、私は終始頭が重かった。彼の物腰に感銘を受けた。',
    vocab: ['bearing', 'heavy head'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.19', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'His <mark>demeanor</mark> was that of a Sandhurst-trained officer in the Life Guards.',
    translation: '彼の立ち居振る舞いは、サンドハースト仕込みのライフガーズ将校そのものだった。',
    vocab: ['demeanor', 'Sandhurst', 'Life Guards'], detail: '' },
  // === Day 5 (2026-04-08) — Ch.1 p.20-21 ===
  { speaker: 'LKY', title: 'Ch.1 p.20', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'and had <mark>resigned</mark>, along with Anthony Eden, accepting responsibility for the <mark>debacle</mark>.',
    translation: 'そしてアンソニー・イーデンと共に辞任し、その大失態の責任を受け入れた。',
    vocab: ['resigned', 'debacle'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.20', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'He was British <mark>upper-class</mark>, good at the <mark>stiff upper lip</mark>.',
    translation: '彼はイギリスの上流階級で、感情を表に出さないことに長けていた。',
    vocab: ['upper-class', 'stiff upper lip'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.20', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'He had done his <mark>utmost</mark> to get the Tunku and the federal government to <mark>adopt policies</mark> that could <mark>build up unity</mark> within Malaysia.',
    translation: '彼はトゥンクと連邦政府にマレーシア内の統一を築けるような政策を採用させるために、全力を尽くしていた。',
    vocab: ['utmost', 'adopt policies', 'build up unity'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.20', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'Harold Wilson has given me <mark>unstinting</mark> support for a <mark>constitutional solution</mark> to the <mark>dispute</mark> between Kuala Lumpur and Singapore.',
    translation: 'ハロルド・ウィルソンは、クアラルンプールとシンガポール間の紛争に対する憲法的解決に、惜しみない支持を与えてくれていた。',
    vocab: ['unstinting', 'constitutional solution', 'dispute'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.20', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'They had <mark>insisted</mark> successfully that <mark>force</mark> should not be used.',
    translation: '彼らは武力を行使すべきでないと強く主張し、それを通していた。',
    vocab: ['insisted', 'force'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.20', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'But <mark>despite</mark> the presence of some 63,000 British servicemen, two aircraft carriers, 80 warships, and 20 <mark>squadrons</mark> of aircraft in Southeast Asia to defend the Federation, he could not <mark>prevail</mark> against the force of Malay <mark>communalism</mark>.',
    translation: 'しかし、約63,000人のイギリス軍人、航空母艦2隻、軍艦80隻、航空機20飛行隊がいたにもかかわらず、マレー民族主義の力には勝てなかった。',
    vocab: ['despite', 'prevail', 'communalism', 'squadrons'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.20', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'That was the <mark>crux</mark> of the matter.',
    translation: 'それが問題の核心だった。',
    vocab: ['crux'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.20', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'I could also <mark>recall</mark> incidents of <mark>friction</mark> and <mark>rivalry</mark> between Malays and non-Malays from my past, especially during my student days at Raffles College in 1940 and 1941.',
    translation: 'マレー系と非マレー系の間の摩擦や対立の出来事を思い出すこともできた。特にラッフルズ・カレッジでの学生時代のことを。',
    vocab: ['recall', 'friction', 'rivalry'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.20', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'I read that the Tunku had <mark>gone down with</mark> <mark>shingles</mark> in London. I suspected he was reaching <mark>breaking point</mark>.',
    translation: 'トゥンクがロンドンで帯状疱疹にかかったと読んだ。限界に達しつつあると私は察した。',
    vocab: ['gone down with', 'shingles', 'breaking point'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.20', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'Head and I were both <mark>controlled</mark> and <mark>restrained</mark> in our <mark>exchanges</mark>.',
    translation: 'ヘッドと私は二人とも、会話の中で感情を抑え、自制していた。',
    vocab: ['controlled', 'restrained', 'exchanges'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.21', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'He uttered no <mark>recriminations</mark>, but simply expressed his regret that I had not informed him or his government of what was happening.',
    translation: '彼は一切の非難を口にせず、ただ起きていることを知らせなかったことへの遺憾の意を表しただけだった。',
    vocab: ['uttered', 'recriminations'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.21', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'On my part, I was filled with sadness for having had to <mark>conceal</mark> from him the final development of the past three weeks that had ended in separation.',
    translation: '過去3週間の、分離に至った最終的な展開を彼に隠さなければならなかったことへの悲しみに満ちていた。',
    vocab: ['conceal', 'separation'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.21', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'Fearful of a deep split in the cabinet and among the MPs, I had wanted every minister to sign the separation agreement precisely because I knew that several would have opposed it <mark>tooth and nail</mark>.',
    translation: '閣内と議員の間に深い亀裂が入ることを恐れ、数人が死に物狂いで反対するからこそ全員に署名させたかった。',
    vocab: ['fearful', 'split', 'precisely', 'tooth and nail'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.21', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'But I had to <mark>get on with</mark> the business of governing this new Singapore.',
    translation: 'この新しいシンガポールを統治する仕事に取りかからなければならなかった。',
    vocab: ['get on with'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.21', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'We had to <mark>sort out</mark> the problems of internal security and defense.',
    translation: '国内治安と防衛の問題を整理・解決しなければならなかった。',
    vocab: ['sort out'], detail: '' },
  // === Day 6 (2026-04-09) — Ch.1 p.21 ===
  { speaker: 'LKY', title: 'Ch.1 p.21', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'I decided to <mark>amalgamate</mark> the Ministry of Foreign Affairs with the new Ministry of Defense, which he\'s <mark>in charge of</mark>.',
    translation: '私は外務省を、彼が担当する新設の国防省と統合することに決めた。',
    vocab: ['amalgamate', 'in charge of'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.21', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'We are <mark>in a daze</mark>, not yet <mark>adjusted to</mark> the new realities and fearful of the <mark>imponderables</mark> ahead.',
    translation: '私たちは茫然としていて、まだ新しい現実に適応しきれず、この先にある予測不能な事態を恐れている。',
    vocab: ['in a daze', 'adjusted to', 'imponderables'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.21', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'We faced a <mark>bleak</mark> future.',
    translation: '私たちは暗い未来に直面していた。',
    vocab: ['bleak'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.21', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'Singapore and Malaysia, joined by a <mark>causeway</mark> across the <mark>Straits</mark> of Johor, had always been <mark>governed as one territory</mark> by the British.',
    translation: 'シンガポールとマレーシアは、ジョホール海峡を渡る土手道でつながれ、イギリスによって常に一つの領土として統治されてきた。',
    vocab: ['causeway', 'Straits', 'governed as one territory'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.21', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'which has Singapore as its administrative and commercial <mark>hub</mark>.',
    translation: 'そしてシンガポールをその行政と商業の中心地としていた。',
    vocab: ['administrative', 'commercial', 'hub'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.21', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'Now we are <mark>on our own</mark>, and the Malaysian government was <mark>out to teach us a lesson</mark> for being difficult and for not <mark>complying with</mark> their norms and practices and <mark>fitting into</mark> their setup.',
    translation: '今や私たちは自力でやるしかなく、マレーシア政府は私たちが従わず体制に収まらなかったことへの報復として、思い知らせようとしていた。',
    vocab: ['on our own', 'out to teach us a lesson', 'complying with', 'fitting into'], detail: '' },
  { speaker: 'LKY', title: 'Ch.1 p.21', flag: '🇸🇬', chapter: 'Ch.1',
    text: 'We could expect them to <mark>cut us off</mark> from our role as their traditional <mark>outlet</mark> for imports and exports, and as the <mark>provider</mark> of many other services.',
    translation: '彼らが私たちを伝統的な輸出入の窓口、多くのサービスの提供者としての役割から切り離してくることは予想できた。',

// Add chapter to existing quotes if not set
QUOTES.forEach(q => { if (!q.chapter) q.chapter = 'Tributes'; });

let quoteMode = 'challenge';
let chapterFilter = 'all';
let challengeIndex = 0;
let challengeOrder = [];

function getFilteredQuotes() {
  if (chapterFilter === 'all') return QUOTES;
  return QUOTES.filter(q => q.chapter === chapterFilter);
}

function setChapterFilter(filter) {
  chapterFilter = filter;
  document.querySelectorAll('.quote-filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (quoteMode === 'read') {
    renderQuotes();
  } else {
    startChallenge();
  }
}

function setQuoteMode(mode) {
  quoteMode = mode;
  document.querySelectorAll('.quote-mode-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const header = document.querySelector('.header');
  const streak = document.querySelector('.streak-bar');
  if (mode === 'read') {
    document.getElementById('quotesReadArea').style.display = 'block';
    document.getElementById('quotesChallengeArea').style.display = 'none';
    header.style.display = '';
    streak.style.display = '';
    renderQuotes();
  } else {
    document.getElementById('quotesReadArea').style.display = 'none';
    document.getElementById('quotesChallengeArea').style.display = 'block';
    header.style.display = 'none';
    streak.style.display = 'none';
    startChallenge();
  }
}

function renderQuotes() {
  const area = document.getElementById('quotesReadArea');
  area.innerHTML = '';
  const filtered = getFilteredQuotes();
  filtered.forEach((q, fi) => {
    const i = QUOTES.indexOf(q);
    const card = document.createElement('div');
    card.className = 'quote-card animate-in';
    card.style.animationDelay = (i * 0.05) + 's';
    card.onclick = () => card.classList.toggle('expanded');
    card.innerHTML = `
      <div class="quote-speaker">
        <span class="quote-speaker-flag">${q.flag}</span>
        <div>
          <div class="quote-speaker-name">${q.speaker}</div>
          <div class="quote-speaker-title">${q.title}</div>
        </div>
      </div>
      <div class="quote-text">${makeClickableMarks(q.text, i)}</div>
      <div class="quote-expand-hint">タップして訳と単語を表示</div>
      <div class="quote-translation">${q.translation}</div>
      <div class="quote-detail">${q.detail || ''}</div>
      <div class="quote-vocab">
        ${q.vocab.map(v => `<span class="quote-vocab-tag">${v}</span>`).join('')}
      </div>
      <button class="quote-play-btn" style="display:inline-block;" onclick="event.stopPropagation(); speakQuote(${i})">🔊 Listen</button>
    `;
    area.appendChild(card);
  });
}

function speakQuote(idx) {
  const q = QUOTES[idx];
  const plainText = q.text.replace(/<[^>]*>/g, '');
  speak(plainText);
}

let challengeStep = 0; // 0=japanese, 1=cloze, 2=full answer

let filteredQuotes = [];

function startChallenge() {
  filteredQuotes = getFilteredQuotes();
  challengeOrder = [...Array(filteredQuotes.length).keys()].sort(() => Math.random() - 0.5);
  challengeIndex = 0;
  challengeStep = 0;
  renderChallenge();
}

function makeCloze(html) {
  // Replace <mark>...</mark> with blanks
  return html.replace(/<mark>(.*?)<\/mark>/g, (match, word) => {
    return `<span class="cloze-blank">${word}</span>`;
  });
}

function makeClickableMarks(html, quoteIdx) {
  // Make each <mark> clickable → opens word popup (only if word is in WORDS)
  return html.replace(/<mark>(.*?)<\/mark>/g, (match, word) => {
    const wordLower = word.toLowerCase().replace(/[^a-z\s]/g, '');
    const hasEntry = WORDS.some(entry =>
      entry.term.toLowerCase() === wordLower ||
      wordLower.includes(entry.term.toLowerCase()) ||
      entry.term.toLowerCase().includes(wordLower)
    );
    if (!hasEntry) return `<mark style="cursor:default;">${word}</mark>`;
    const escaped = word.replace(/'/g, "\\'");
    return `<mark onclick="event.stopPropagation(); showWordPopup('${escaped}', ${quoteIdx})">${word}</mark>`;
  });
}

function renderChallenge() {
  const area = document.getElementById('quotesChallengeArea');
  if (challengeIndex >= challengeOrder.length) {
    area.innerHTML = `
      <div class="quiz-score">
        <div class="quiz-score-number" style="color:var(--green)">Complete!</div>
        <div class="quiz-score-label">全${filteredQuotes.length}文を練習しました</div>
        <br>
        <button class="challenge-show-btn" onclick="startChallenge()">もう一度</button>
      </div>`;
    return;
  }
  challengeStep = 0;
  const q = filteredQuotes[challengeOrder[challengeIndex]];
  const qIdx = QUOTES.indexOf(q);
  const clozeHtml = makeCloze(q.text);
  const revealHtml = makeClickableMarks(q.text, qIdx);
  area.innerHTML = `
    <div class="challenge-progress">${challengeIndex + 1} / ${filteredQuotes.length}</div>
    <div class="challenge-card animate-in">
      <div class="challenge-speaker">
        ${q.flag} ${q.speaker} — ${q.title}
      </div>
      <div class="challenge-japanese">${q.translation}</div>
      <div class="challenge-actions">
        <button class="challenge-show-btn" id="challengeNextStep" onclick="nextStep(${qIdx})">穴埋めを見る →</button>
        <button class="challenge-hint-btn" onclick="event.stopPropagation(); speakQuote(${qIdx})" style="margin-left:auto;">🔊</button>
      </div>
      <div class="challenge-cloze" id="challengeCloze-${qIdx}">${clozeHtml}</div>
      <div class="challenge-reveal" id="challengeReveal-${qIdx}">${revealHtml}${q.detail ? '<div style="margin-top:1rem;font-style:normal;font-size:0.85rem;line-height:1.8;">' + q.detail + '</div>' : ''}</div>
    </div>
    <div class="challenge-nav">
      <button class="challenge-nav-btn" onclick="prevChallenge()" ${challengeIndex === 0 ? 'disabled style="opacity:0.3"' : ''}>← Prev</button>
      <button class="challenge-nav-btn" onclick="nextChallenge()">Next →</button>
    </div>
  `;
}

function nextStep(qIdx) {
  challengeStep++;
  const btn = document.getElementById('challengeNextStep');
  if (challengeStep === 1) {
    document.getElementById('challengeCloze-' + qIdx).classList.add('show');
    btn.textContent = '答えを見る →';
  } else if (challengeStep === 2) {
    document.getElementById('challengeCloze-' + qIdx).classList.remove('show');
    document.getElementById('challengeReveal-' + qIdx).classList.add('show');
    btn.textContent = '🔊 読み上げ';
  } else {
    speakQuote(QUOTES.indexOf(filteredQuotes[challengeOrder[challengeIndex]]));
  }
}

function showWordPopup(word, quoteIdx) {
  // Find matching WORD entry
  const wordLower = word.toLowerCase().replace(/[^a-z\s]/g, '');
  let w = WORDS.find(entry =>
    entry.term.toLowerCase() === wordLower ||
    wordLower.includes(entry.term.toLowerCase()) ||
    entry.term.toLowerCase().includes(wordLower)
  );

  // Also check vocab in the quote
  const q = QUOTES[quoteIdx];

  let etymHtml = '';
  if (w && w.etymology) {
    etymHtml = `<div class="word-popup-etymology"><span class="root">${w.etymology.root}</span> = ${w.etymology.meaning} → ${w.etymology.words.join(', ')}</div>`;
  }

  const overlay = document.createElement('div');
  overlay.className = 'word-popup-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  if (w) {
    overlay.innerHTML = `
      <div class="word-popup">
        <button class="word-popup-close" onclick="this.closest('.word-popup-overlay').remove()">✕</button>
        <div class="word-popup-term">${w.term} <button class="speak-btn" onclick="speak('${w.term.replace(/'/g, "\\'")}')">🔊</button></div>
        <div class="word-popup-meaning">${w.meaning}</div>
        <div class="word-popup-detail">${w.detail}</div>
        ${etymHtml}
      </div>
    `;
  } else {
    // No WORDS entry found — don't show popup
    return;
  }
  document.body.appendChild(overlay);
}

function nextChallenge() {
  challengeIndex++;
  renderChallenge();
}

function prevChallenge() {
  if (challengeIndex > 0) { challengeIndex--; renderChallenge(); }
}

// ===== PASSWORD =====
function checkPassword() {
  const input = document.getElementById('passwordInput');
  if (input.value.toLowerCase() === 'ablest') {
    const screen = document.getElementById('passwordScreen');
    const app = document.getElementById('appContent');
    screen.classList.add('hidden');
    app.classList.add('visible');
    sessionStorage.setItem('lky-auth', 'true');
    init();
  } else {
    input.classList.add('wrong');
    document.getElementById('passwordError').textContent = 'Try again.';
    setTimeout(() => { input.classList.remove('wrong'); }, 400);
    input.value = '';
  }
}

document.getElementById('passwordInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') checkPassword();
});

// Check if already authenticated this session
if (sessionStorage.getItem('lky-auth') === 'true') {
  document.getElementById('passwordScreen').classList.add('hidden');
  document.getElementById('appContent').classList.add('visible');
  init();
}
</script>
</div><!-- end app-content -->

</html>
