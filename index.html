<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LKY English — 遠山寛治</title>
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0efec;
    --border: #e0ddd8;
    --text: #2c2c2c;
    --text-muted: #777770;
    --accent: #4a6fa5;
    --accent2: #c0694a;
    --gold: #b8860b;
    --green: #3a7d44;
    --red: #c0392b;
    --orange: #c97b2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Password screen */
  .password-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s;
  }
  .password-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .password-logo {
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
  .password-hint {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
  }
  .password-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1.5rem;
    font-family: inherit;
    font-size: 1.1rem;
    color: var(--text);
    text-align: center;
    width: 250px;
    outline: none;
    transition: border-color 0.2s;
  }
  .password-input:focus { border-color: var(--accent); }
  .password-input.wrong {
    border-color: var(--red);
    animation: shake 0.4s ease;
  }
  .password-error {
    color: var(--red);
    font-size: 0.8rem;
    margin-top: 0.5rem;
    height: 1.2rem;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  .app-content { display: none; }
  .app-content.visible { display: block; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 2rem 1rem 1rem;
    position: relative;
  }
  .header h1 {
    font-size: 1.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
  }
  .header .subtitle {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-top: 0.3rem;
  }

  /* Streak */
  .streak-bar {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    padding: 1rem;
    margin: 0.5rem auto;
    max-width: 500px;
  }
  .streak-item {
    text-align: center;
  }
  .streak-number {
    font-size: 2rem;
    font-weight: 800;
    color: var(--gold);
  }
  .streak-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Navigation */
  .nav {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    flex-wrap: wrap;
  }
  .nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .nav button:hover { border-color: var(--accent); color: var(--text); }
  .nav button.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Sections */
  .section { display: none; padding: 1rem; max-width: 800px; margin: 0 auto; }
  .section.active { display: block; }

  /* ===== DASHBOARD ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 0.8rem;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    text-align: center;
  }
  .stat-value { font-size: 2rem; font-weight: 800; }
  .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.3rem; }
  .mastery-new .stat-value { color: var(--accent); }
  .mastery-learning .stat-value { color: var(--orange); }
  .mastery-known .stat-value { color: var(--green); }

  /* Daily chart */
  .daily-chart {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    margin-bottom: 1.5rem;
  }
  .daily-chart h3 {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 0.8rem;
  }
  .daily-bars {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 100px;
  }
  .daily-bar-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .daily-bar {
    width: 100%;
    max-width: 40px;
    background: var(--accent);
    border-radius: 4px 4px 0 0;
    min-height: 2px;
    position: relative;
    transition: height 0.5s ease;
  }
  .daily-bar-count {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--accent);
  }
  .daily-bar-date {
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .daily-total {
    text-align: right;
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
  }

  /* Speak button */
  .speak-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 36px;
    height: 36px;
    cursor: pointer;
    font-size: 1rem;
    color: var(--text-muted);
    transition: all 0.2s;
    margin-top: 0.5rem;
  }
  .speak-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Word list */
  .word-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .word-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .word-item:hover { border-color: var(--accent); transform: translateX(4px); }
  .word-flag { font-size: 1.3rem; }
  .word-term { font-weight: 700; font-size: 1rem; flex: 1; }
  .word-meaning { color: var(--text-muted); font-size: 0.85rem; max-width: 50%; text-align: right; }
  .word-mastery {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0;
  }
  .mastery-0 { background: var(--accent); }
  .mastery-1 { background: var(--orange); }
  .mastery-2 { background: var(--green); }

  /* ===== FLASHCARD ===== */
  .flashcard-container {
    perspective: 1000px;
    margin: 2rem auto;
    max-width: 500px;
  }
  .flashcard-progress {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-bottom: 1rem;
  }
  .flashcard {
    width: 100%;
    min-height: 350px;
    position: relative;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .flashcard.flipped { transform: rotateY(180deg); }
  .flashcard-face {
    position: absolute;
    width: 100%;
    min-height: 350px;
    backface-visibility: hidden;
    border-radius: 16px;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .flashcard-front {
    background: linear-gradient(135deg, #fff, #f5f4f1);
    border: 1px solid var(--border);
  }
  .flashcard-back {
    background: linear-gradient(135deg, #f5f9f5, #eef5ee);
    border: 1px solid #c5d8c5;
    transform: rotateY(180deg);
  }
  .flashcard-word {
    font-size: 2.2rem;
    font-weight: 800;
    margin-bottom: 1rem;
    color: var(--accent);
  }
  .flashcard-speaker {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }
  .flashcard-quote {
    font-size: 0.9rem;
    font-style: italic;
    color: var(--text-muted);
    line-height: 1.5;
    max-width: 400px;
  }
  .flashcard-quote mark {
    background: rgba(74, 111, 165, 0.15);
    color: var(--accent);
    border-radius: 3px;
    padding: 0 3px;
  }
  .flashcard-hint {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 1.5rem;
    opacity: 0.5;
  }
  .flashcard-meaning {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 0.8rem;
  }
  .flashcard-detail {
    font-size: 0.9rem;
    color: var(--text-muted);
    line-height: 1.6;
    max-width: 400px;
  }
  .flashcard-etymology {
    margin-top: 1rem;
    padding: 0.8rem;
    background: rgba(0,0,0,0.03);
    border-radius: 8px;
    font-size: 0.8rem;
  }
  .flashcard-etymology .root {
    color: var(--gold);
    font-weight: 700;
  }
  .flashcard-actions {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
    margin-top: 1.5rem;
  }
  .flashcard-actions button {
    padding: 0.8rem 1.5rem;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-forgot { background: var(--red); color: #fff; }
  .btn-forgot:hover { filter: brightness(1.2); }
  .btn-hard { background: var(--orange); color: #fff; }
  .btn-hard:hover { filter: brightness(1.2); }
  .btn-easy { background: var(--green); color: #000; }
  .btn-easy:hover { filter: brightness(1.2); }

  /* ===== QUIZ ===== */
  .quiz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 2rem;
    margin-bottom: 1rem;
    transition: all 0.3s;
  }
  .quiz-card.correct { border-color: var(--green); background: rgba(74, 222, 128, 0.05); }
  .quiz-card.wrong { border-color: var(--red); background: rgba(248, 113, 113, 0.05); }
  .quiz-type {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 0.8rem;
  }
  .quiz-question {
    font-size: 1.1rem;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 1rem;
  }
  .quiz-question .blank {
    display: inline-block;
    min-width: 120px;
    border-bottom: 2px solid var(--accent);
    margin: 0 4px;
  }
  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }
  .quiz-option {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    color: var(--text);
    text-align: left;
    transition: all 0.2s;
  }
  .quiz-option:hover { border-color: var(--accent); }
  .quiz-option.selected-correct {
    border-color: var(--green);
    background: rgba(58, 125, 68, 0.1);
    color: var(--green);
  }
  .quiz-option.selected-wrong {
    border-color: var(--red);
    background: rgba(192, 57, 43, 0.1);
    color: var(--red);
  }
  .quiz-option.reveal-correct {
    border-color: var(--green);
    background: rgba(58, 125, 68, 0.08);
  }
  .quiz-feedback {
    margin-top: 1rem;
    padding: 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    line-height: 1.5;
    display: none;
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.correct-fb { background: rgba(58, 125, 68, 0.1); color: var(--green); }
  .quiz-feedback.wrong-fb { background: rgba(192, 57, 43, 0.1); color: var(--red); }
  .quiz-score {
    text-align: center;
    padding: 2rem;
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
  }
  .quiz-score-number {
    font-size: 3rem;
    font-weight: 800;
  }
  .quiz-score-label {
    color: var(--text-muted);
    margin-top: 0.5rem;
  }
  .quiz-next-btn {
    display: block;
    margin: 1rem auto;
    padding: 0.8rem 2rem;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }
  .quiz-next-btn:hover { filter: brightness(1.2); }

  /* ===== WORD MAP ===== */
  .wordmap-container {
    position: relative;
    width: 100%;
    height: 500px;
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 1rem;
  }
  .wordmap-node {
    position: absolute;
    padding: 0.5rem 1rem;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
    z-index: 2;
  }
  .wordmap-node:hover { transform: scale(1.15); z-index: 10; }
  .wordmap-node.cat-power { background: rgba(74,111,165,0.1); color: var(--accent); border: 1px solid rgba(74,111,165,0.3); }
  .wordmap-node.cat-intellect { background: rgba(120,100,170,0.1); color: #6b5fa0; border: 1px solid rgba(120,100,170,0.3); }
  .wordmap-node.cat-character { background: rgba(58,125,68,0.1); color: var(--green); border: 1px solid rgba(58,125,68,0.3); }
  .wordmap-node.cat-structure { background: rgba(201,123,42,0.1); color: var(--orange); border: 1px solid rgba(201,123,42,0.3); }
  .wordmap-node.cat-boundary { background: rgba(192,105,74,0.1); color: var(--accent2); border: 1px solid rgba(192,105,74,0.3); }
  .wordmap-legend {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 0.8rem;
  }
  .wordmap-legend span {
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .legend-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }

  /* Etymology tree */
  .etymology-section { margin-top: 1.5rem; }
  .etymology-tree {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 0.8rem;
    text-align: center;
  }
  .etym-root {
    display: inline-block;
    padding: 0.4rem 1rem;
    background: rgba(255, 215, 0, 0.15);
    border: 1px solid rgba(255, 215, 0, 0.3);
    border-radius: 20px;
    color: var(--gold);
    font-weight: 700;
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
  }
  .etym-arrow { color: var(--text-muted); font-size: 1.2rem; }
  .etym-words {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }
  .etym-word {
    padding: 0.3rem 0.8rem;
    background: rgba(108,140,255,0.15);
    border: 1px solid rgba(108,140,255,0.3);
    border-radius: 15px;
    font-size: 0.8rem;
    color: var(--accent);
  }

  /* Copy results */
  .copy-btn {
    display: block;
    margin: 1.5rem auto;
    padding: 0.8rem 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--text); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .animate-in { animation: fadeIn 0.4s ease forwards; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  @keyframes confetti {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
  }
  .confetti-particle {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>

<!-- Password Screen -->
<div class="password-screen" id="passwordScreen">
  <div class="password-logo">LKY English</div>
  <div class="password-hint">What kind of person do you want to become?</div>
  <input type="password" class="password-input" id="passwordInput" placeholder="Enter password" autofocus>
  <div class="password-error" id="passwordError"></div>
</div>

<!-- App Content -->
<div class="app-content" id="appContent">
<div class="header">
  <h1>LKY English</h1>
  <p class="subtitle">The Singapore Story — 遠山寛治の英語学習</p>
</div>

<div class="streak-bar">
  <div class="streak-item">
    <div class="streak-number" id="streakCount">1</div>
    <div class="streak-label">Day Streak</div>
  </div>
  <div class="streak-item">
    <div class="streak-number" id="totalWords">0</div>
    <div class="streak-label">Words Learned</div>
  </div>
  <div class="streak-item">
    <div class="streak-number" id="quizAccuracy">—</div>
    <div class="streak-label">Quiz Accuracy</div>
  </div>
</div>

<nav class="nav">
  <button class="active" onclick="showSection('dashboard')">Dashboard</button>
  <button onclick="showSection('flashcard')">Flashcard</button>
  <button onclick="showSection('quiz')">Quiz</button>
  <button onclick="showSection('wordmap')">Word Map</button>
  <button onclick="showSection('etymology')">Etymology</button>
</nav>

<!-- DASHBOARD -->
<div class="section active" id="sec-dashboard">
  <div class="stats-grid">
    <div class="stat-card mastery-new"><div class="stat-value" id="countNew">0</div><div class="stat-label">New</div></div>
    <div class="stat-card mastery-learning"><div class="stat-value" id="countLearning">0</div><div class="stat-label">Learning</div></div>
    <div class="stat-card mastery-known"><div class="stat-value" id="countKnown">0</div><div class="stat-label">Mastered</div></div>
  </div>
  <div class="daily-chart" id="dailyChart"></div>
  <div class="word-list" id="wordList"></div>
</div>

<!-- FLASHCARD -->
<div class="section" id="sec-flashcard">
  <div class="flashcard-container">
    <div class="flashcard-progress" id="fcProgress">1 / 1</div>
    <div class="flashcard" id="flashcard" onclick="flipCard()">
      <div class="flashcard-face flashcard-front" id="fcFront"></div>
      <div class="flashcard-face flashcard-back" id="fcBack"></div>
    </div>
    <div class="flashcard-actions">
      <button class="btn-forgot" onclick="rateCard(0)">忘れた</button>
      <button class="btn-hard" onclick="rateCard(1)">微妙</button>
      <button class="btn-easy" onclick="rateCard(2)">覚えた!</button>
    </div>
  </div>
</div>

<!-- QUIZ -->
<div class="section" id="sec-quiz">
  <div id="quizArea"></div>
  <button class="copy-btn" id="copyResults" onclick="copyResults()" style="display:none;">📋 結果をClaude Codeにコピー</button>
</div>

<!-- WORD MAP -->
<div class="section" id="sec-wordmap">
  <div class="wordmap-legend">
    <span><span class="legend-dot" style="background:var(--accent)"></span> Power</span>
    <span><span class="legend-dot" style="background:#a78bfa"></span> Intellect</span>
    <span><span class="legend-dot" style="background:var(--green)"></span> Character</span>
    <span><span class="legend-dot" style="background:var(--orange)"></span> Structure</span>
    <span><span class="legend-dot" style="background:var(--accent2)"></span> Boundary</span>
  </div>
  <div class="wordmap-container" id="wordmapContainer"></div>
</div>

<!-- ETYMOLOGY -->
<div class="section" id="sec-etymology">
  <div class="etymology-section" id="etymologyArea"></div>
</div>

<script>
// ===== DATA =====
const WORDS = [
  {
    id: 'ablest', term: 'ablest', meaning: '最も有能な',
    detail: 'able の最上級。capable より格式が高い。政治家・経営者を評する文脈で使う。',
    quote: 'the <mark>ablest</mark> man I have ever met',
    speaker: 'LKY on George H.W. Bush', flag: '🇸🇬',
    etymology: { root: 'habilis (Latin)', meaning: '扱いやすい、適切な', words: ['able', 'ablest', 'ability', 'enable'] },
    category: 'power', related: ['brilliant', 'forceful'], date: '2026-04-04'

// ===== STATE =====
let mastery = JSON.parse(localStorage.getItem('lky-mastery') || '{}');
let quizHistory = JSON.parse(localStorage.getItem('lky-quiz-history') || '[]');
let streak = JSON.parse(localStorage.getItem('lky-streak') || '{"count":1,"lastDate":"2026-04-04"}');
let fcIndex = 0;
let fcFlipped = false;
let fcOrder = [];
let quizQuestions = [];
let quizIndex = 0;
let quizCorrect = 0;
let quizResults = [];

// ===== INIT =====
function init() {
  WORDS.forEach(w => { if (!mastery[w.id]) mastery[w.id] = 0; });
  updateStreak();
  renderDashboard();
  initFlashcards();
  renderWordMap();
  renderEtymology();
  updateStats();
}

function updateStreak() {
  const today = new Date().toISOString().split('T')[0];
  if (streak.lastDate !== today) {
    const last = new Date(streak.lastDate);
    const diff = Math.floor((new Date(today) - last) / 86400000);
    streak.count = diff === 1 ? streak.count + 1 : 1;
    streak.lastDate = today;
    localStorage.setItem('lky-streak', JSON.stringify(streak));
  }
  document.getElementById('streakCount').textContent = streak.count;
}

function updateStats() {
  const vals = Object.values(mastery);
  document.getElementById('totalWords').textContent = WORDS.length;
  document.getElementById('countNew').textContent = vals.filter(v => v === 0).length;
  document.getElementById('countLearning').textContent = vals.filter(v => v === 1).length;
  document.getElementById('countKnown').textContent = vals.filter(v => v === 2).length;
  const total = quizHistory.reduce((a, b) => a + b.total, 0);
  const correct = quizHistory.reduce((a, b) => a + b.correct, 0);
  document.getElementById('quizAccuracy').textContent = total > 0 ? Math.round(correct / total * 100) + '%' : '—';
}

function saveMastery() {
  localStorage.setItem('lky-mastery', JSON.stringify(mastery));
  updateStats();
}

// ===== NAVIGATION =====
function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'quiz') startQuiz();
}

// ===== DASHBOARD =====
function renderDailyChart() {
  const chart = document.getElementById('dailyChart');
  const dateCounts = {};
  WORDS.forEach(w => {
    if (!w.date) return;
    dateCounts[w.date] = (dateCounts[w.date] || 0) + 1;
  });
  const dates = Object.keys(dateCounts).sort();
  if (dates.length === 0) { chart.style.display = 'none'; return; }

  const maxCount = Math.max(...Object.values(dateCounts));
  const totalWords = WORDS.length;
  const barHeight = 80;

  chart.innerHTML = `
    <h3>Daily Progress</h3>
    <div class="daily-bars">
      ${dates.map(d => {
        const count = dateCounts[d];
        const h = Math.max(4, (count / maxCount) * barHeight);
        const label = d.slice(5).replace('-', '/');
        return `<div class="daily-bar-group">
          <div class="daily-bar-count">${count}</div>
          <div class="daily-bar" style="height:${h}px"></div>
          <div class="daily-bar-date">${label}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="daily-total">Total: ${totalWords} words in ${dates.length} day${dates.length > 1 ? 's' : ''}</div>
  `;
}

function renderDashboard() {
  renderDailyChart();
  const list = document.getElementById('wordList');
  list.innerHTML = '';
  WORDS.forEach(w => {
    const m = mastery[w.id] || 0;
    const div = document.createElement('div');
    div.className = 'word-item animate-in';
    div.innerHTML = `
      <span class="word-flag">${w.flag}</span>
      <span class="word-term">${w.term}</span>
      <span class="word-meaning">${w.meaning}</span>
      <span class="word-mastery mastery-${m}"></span>
    `;
    list.appendChild(div);
  });
}

// ===== FLASHCARD =====
function initFlashcards() {
  fcOrder = [...Array(WORDS.length).keys()].sort(() => Math.random() - 0.5);
  fcIndex = 0;
  fcFlipped = false;
  renderFlashcard();
}

function renderFlashcard() {
  if (fcIndex >= fcOrder.length) { fcIndex = 0; initFlashcards(); return; }
  const w = WORDS[fcOrder[fcIndex]];
  const fc = document.getElementById('flashcard');
  fc.classList.remove('flipped');
  fcFlipped = false;

  document.getElementById('fcProgress').textContent = `${fcIndex + 1} / ${fcOrder.length}`;

  document.getElementById('fcFront').innerHTML = `
    <div class="flashcard-word">${w.term}</div>
    <button class="speak-btn" onclick="event.stopPropagation(); speak('${w.term.replace(/'/g, "\\'")}')">🔊</button>
    <div class="flashcard-speaker">${w.flag} ${w.speaker}</div>
    <div class="flashcard-quote">${w.quote}</div>
    <div class="flashcard-hint">タップして意味を確認</div>
  `;

  let etymHtml = '';
  if (w.etymology) {
    etymHtml = `<div class="flashcard-etymology">
      <span class="root">${w.etymology.root}</span> = ${w.etymology.meaning}<br>
      → ${w.etymology.words.join(', ')}
    </div>`;
  }

  document.getElementById('fcBack').innerHTML = `
    <div class="flashcard-meaning">${w.meaning}</div>
    <button class="speak-btn" onclick="event.stopPropagation(); speak('${w.term.replace(/'/g, "\\'")}')">🔊</button>
    <div class="flashcard-detail">${w.detail}</div>
    ${etymHtml}
  `;
}

function flipCard() {
  const fc = document.getElementById('flashcard');
  fcFlipped = !fcFlipped;
  fc.classList.toggle('flipped');
}

function rateCard(level) {
  const w = WORDS[fcOrder[fcIndex]];
  mastery[w.id] = level;
  saveMastery();
  renderDashboard();
  fcIndex++;
  if (fcIndex < fcOrder.length) {
    renderFlashcard();
  } else {
    document.getElementById('fcFront').innerHTML = '<div class="flashcard-word">Complete!</div><div class="flashcard-hint">全カード完了</div>';
    document.getElementById('fcBack').innerHTML = '';
  }
}

// ===== QUIZ =====
function startQuiz() {
  quizQuestions = generateQuiz();
  quizIndex = 0;
  quizCorrect = 0;
  quizResults = [];
  document.getElementById('copyResults').style.display = 'none';
  renderQuizQuestion();
}

function generateQuiz() {
  const questions = [];
  const shuffled = [...WORDS].sort(() => Math.random() - 0.5);

  // Type 1: Meaning quiz
  shuffled.slice(0, 5).forEach(w => {
    const options = [w.meaning];
    const others = WORDS.filter(x => x.id !== w.id).sort(() => Math.random() - 0.5).slice(0, 3);
    others.forEach(o => options.push(o.meaning));
    questions.push({
      type: 'meaning',
      typeLabel: '意味を選べ',
      question: `<strong>${w.term}</strong> の意味は？`,
      options: options.sort(() => Math.random() - 0.5),
      answer: w.meaning,
      word: w
    });
  });

  // Type 2: Fill in the blank
  shuffled.slice(5, 10).forEach(w => {
    if (!w.quote) return;
    const blank = w.quote.replace(/<mark>.*?<\/mark>/, '<span class="blank">&nbsp;</span>');
    const correctText = w.quote.match(/<mark>(.*?)<\/mark>/)?.[1] || w.term;
    const options = [correctText];
    const others = WORDS.filter(x => x.id !== w.id).sort(() => Math.random() - 0.5).slice(0, 3);
    others.forEach(o => {
      const m = o.quote?.match(/<mark>(.*?)<\/mark>/);
      if (m) options.push(m[1]);
      else options.push(o.term);
    });
    if (options.length < 4) return;
    questions.push({
      type: 'fill',
      typeLabel: '穴埋め',
      question: `${blank}<br><small style="color:var(--text-muted)">${w.flag} ${w.speaker}</small>`,
      options: options.slice(0, 4).sort(() => Math.random() - 0.5),
      answer: correctText,
      word: w
    });
  });

  return questions.sort(() => Math.random() - 0.5).slice(0, 8);
}

function renderQuizQuestion() {
  const area = document.getElementById('quizArea');
  if (quizIndex >= quizQuestions.length) {
    renderQuizScore();
    return;
  }
  const q = quizQuestions[quizIndex];
  area.innerHTML = `
    <div class="flashcard-progress">${quizIndex + 1} / ${quizQuestions.length}</div>
    <div class="quiz-card" id="currentQuiz">
      <div class="quiz-type">${q.typeLabel}</div>
      <div class="quiz-question">${q.question}</div>
      <div class="quiz-options">
        ${q.options.map((o, i) => `<button class="quiz-option" onclick="answerQuiz(${i})">${o}</button>`).join('')}
      </div>
      <div class="quiz-feedback" id="quizFeedback"></div>
    </div>
    <button class="quiz-next-btn" id="quizNextBtn" style="display:none" onclick="nextQuiz()">次へ →</button>
  `;
}

function answerQuiz(idx) {
  const q = quizQuestions[quizIndex];
  const options = document.querySelectorAll('.quiz-option');
  const selected = q.options[idx];
  const correct = selected === q.answer;

  options.forEach((opt, i) => {
    opt.style.pointerEvents = 'none';
    if (q.options[i] === q.answer) opt.classList.add('reveal-correct');
    if (i === idx && !correct) opt.classList.add('selected-wrong');
    if (i === idx && correct) opt.classList.add('selected-correct');
  });

  const fb = document.getElementById('quizFeedback');
  const card = document.getElementById('currentQuiz');

  if (correct) {
    quizCorrect++;
    fb.className = 'quiz-feedback show correct-fb';
    fb.textContent = '✓ 正解!';
    card.classList.add('correct');
    spawnConfetti();
  } else {
    fb.className = 'quiz-feedback show wrong-fb';
    fb.innerHTML = `✗ 正解: <strong>${q.answer}</strong><br>${q.word.detail}`;
    card.classList.add('wrong');
  }

  quizResults.push({ word: q.word.term, correct });
  document.getElementById('quizNextBtn').style.display = 'block';
}

function nextQuiz() {
  quizIndex++;
  renderQuizQuestion();
}

function renderQuizScore() {
  const pct = Math.round(quizCorrect / quizQuestions.length * 100);
  const color = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--orange)' : 'var(--red)';
  document.getElementById('quizArea').innerHTML = `
    <div class="quiz-score">
      <div class="quiz-score-number" style="color:${color}">${pct}%</div>
      <div class="quiz-score-label">${quizCorrect} / ${quizQuestions.length} 正解</div>
      <br>
      ${quizResults.map(r => `<span style="color:${r.correct ? 'var(--green)' : 'var(--red)'}">${r.correct ? '✓' : '✗'} ${r.word}</span>`).join('&nbsp;&nbsp;')}
      <br><br>
      <button class="quiz-next-btn" onclick="startQuiz()">もう一度</button>
    </div>
  `;
  document.getElementById('copyResults').style.display = 'block';

  quizHistory.push({ date: new Date().toISOString(), correct: quizCorrect, total: quizQuestions.length });
  localStorage.setItem('lky-quiz-history', JSON.stringify(quizHistory));
  updateStats();
}

function spawnConfetti() {
  const colors = ['#ffd700', '#6c8cff', '#4ade80', '#ff6c8c', '#a78bfa'];
  for (let i = 0; i < 12; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-particle';
    el.style.left = (40 + Math.random() * 20) + 'vw';
    el.style.top = (30 + Math.random() * 20) + 'vh';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animation = `confetti ${0.6 + Math.random() * 0.5}s ease forwards`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }
}

// ===== COPY RESULTS =====
function copyResults() {
  const missed = quizResults.filter(r => !r.correct).map(r => r.word);
  const pct = Math.round(quizCorrect / quizQuestions.length * 100);
  const text = `Quiz Result: ${pct}% (${quizCorrect}/${quizQuestions.length})\n` +
    `Date: ${new Date().toLocaleDateString()}\n` +
    `Missed: ${missed.length > 0 ? missed.join(', ') : 'none'}\n` +
    `Mastery: New=${document.getElementById('countNew').textContent} Learning=${document.getElementById('countLearning').textContent} Known=${document.getElementById('countKnown').textContent}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyResults');
    btn.textContent = '✓ コピーしました!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 結果をClaude Codeにコピー'; btn.classList.remove('copied'); }, 2000);
  });
}

// ===== WORD MAP =====
function renderWordMap() {
  const container = document.getElementById('wordmapContainer');
  const catColors = { power: 'cat-power', intellect: 'cat-intellect', character: 'cat-character', structure: 'cat-structure', boundary: 'cat-boundary' };

  // Simple force-directed-ish layout
  const positions = [];
  const w = container.offsetWidth || 700;
  const h = 500;
  const cx = w / 2, cy = h / 2;

  WORDS.forEach((word, i) => {
    const angle = (i / WORDS.length) * Math.PI * 2 - Math.PI / 2;
    const radius = 140 + Math.random() * 60;
    const x = cx + Math.cos(angle) * radius - 40;
    const y = cy + Math.sin(angle) * radius - 15;
    positions.push({ x, y });

    const node = document.createElement('div');
    node.className = `wordmap-node ${catColors[word.category]}`;
    node.style.left = x + 'px';
    node.style.top = y + 'px';
    node.textContent = word.term;
    node.title = word.meaning;
    container.appendChild(node);
  });

  // Draw SVG lines for related words
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;';
  WORDS.forEach((word, i) => {
    (word.related || []).forEach(relId => {
      const j = WORDS.findIndex(w => w.id === relId);
      if (j === -1 || j <= i) return;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', positions[i].x + 40);
      line.setAttribute('y1', positions[i].y + 15);
      line.setAttribute('x2', positions[j].x + 40);
      line.setAttribute('y2', positions[j].y + 15);
      line.setAttribute('stroke', 'rgba(74,111,165,0.2)');
      line.setAttribute('stroke-width', '1');
      svg.appendChild(line);
    });
  });
  container.insertBefore(svg, container.firstChild);
}

  const seen = new Set();
  WORDS.forEach(w => {
    if (!w.etymology || seen.has(w.etymology.root)) return;
    seen.add(w.etymology.root);
    const div = document.createElement('div');
    div.className = 'etymology-tree animate-in';
    div.innerHTML = `
      <div class="etym-root">${w.etymology.root}</div>
      <div style="color:var(--text-muted);font-size:0.8rem;margin:0.3rem 0;">${w.etymology.meaning}</div>
      <div class="etym-arrow">↓</div>
      <div class="etym-words">
        ${w.etymology.words.map(ew => `<span class="etym-word">${ew}</span>`).join('')}
      </div>
    `;
    area.appendChild(div);
  });
}

// ===== SPEAK =====
let voicesLoaded = false;
speechSynthesis.onvoiceschanged = () => { voicesLoaded = true; };

function speak(text) {
  speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  utterance.rate = 0.9;
  utterance.pitch = 1.0;
  const voices = speechSynthesis.getVoices();
  // Mac: prefer high-quality voices
  const preferred = ['Evan', 'Zoe', 'Samantha', 'Karen', 'Daniel', 'Moira', 'Tessa'];
  let voice = null;
  for (const name of preferred) {
    voice = voices.find(v => v.name.includes(name) && v.lang.startsWith('en'));
    if (voice) break;
  }
  if (!voice) voice = voices.find(v => v.lang === 'en-US');
  if (!voice) voice = voices.find(v => v.lang.startsWith('en'));
  if (voice) utterance.voice = voice;
  speechSynthesis.speak(utterance);
}

// ===== PASSWORD =====
function checkPassword() {
  const input = document.getElementById('passwordInput');
  if (input.value.toLowerCase() === 'ablest') {
    const screen = document.getElementById('passwordScreen');
    const app = document.getElementById('appContent');
    screen.classList.add('hidden');
    app.classList.add('visible');
    sessionStorage.setItem('lky-auth', 'true');
    init();
  } else {
    input.classList.add('wrong');
    document.getElementById('passwordError').textContent = 'Try again.';
    setTimeout(() => { input.classList.remove('wrong'); }, 400);
    input.value = '';
  }
}

document.getElementById('passwordInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') checkPassword();
});

// Check if already authenticated this session
if (sessionStorage.getItem('lky-auth') === 'true') {
  document.getElementById('passwordScreen').classList.add('hidden');
  document.getElementById('appContent').classList.add('visible');
  init();
}
